<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a3055"/>
    </linearGradient>
    <linearGradient id="screenV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a56db" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glowV" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgV)"/>
  <rect width="800" height="600" fill="url(#glowV)"/>
  <!-- Network grid (background) -->
  <g stroke="#0ea5e9" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Central monitor -->
  <rect x="250" y="140" width="300" height="200" rx="8" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" opacity="0.8"/>
  <rect x="262" y="152" width="276" height="176" rx="4" fill="url(#screenV)"/>
  <!-- Video call grid on screen -->
  <rect x="272" y="162" width="126" height="76" rx="3" fill="#1a56db" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <rect x="408" y="162" width="120" height="76" rx="3" fill="#1a56db" opacity="0.15" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <rect x="272" y="248" width="126" height="70" rx="3" fill="#1a56db" opacity="0.15" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <rect x="408" y="248" width="120" height="70" rx="3" fill="#1a56db" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <!-- Person silhouettes in video tiles -->
  <circle cx="335" cy="190" r="12" fill="#0ea5e9" opacity="0.15"/>
  <ellipse cx="335" cy="220" rx="18" ry="12" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="468" cy="190" r="12" fill="#0ea5e9" opacity="0.12"/>
  <ellipse cx="468" cy="220" rx="18" ry="12" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="335" cy="272" r="10" fill="#0ea5e9" opacity="0.12"/>
  <ellipse cx="335" cy="298" rx="16" ry="10" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="468" cy="272" r="10" fill="#0ea5e9" opacity="0.15"/>
  <ellipse cx="468" cy="298" rx="16" ry="10" fill="#0ea5e9" opacity="0.1"/>
  <!-- Monitor stand -->
  <rect x="370" y="340" width="60" height="12" fill="#1a3055" rx="2"/>
  <rect x="380" y="352" width="40" height="8" fill="#12203a" rx="1"/>
  <rect x="360" y="358" width="80" height="6" fill="#1a3055" rx="3"/>
  <!-- Connection lines to nodes -->
  <g stroke="#0ea5e9" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,4">
    <line x1="250" y1="240" x2="100" y2="160"/>
    <line x1="550" y1="240" x2="700" y2="160"/>
    <line x1="250" y1="300" x2="100" y2="420"/>
    <line x1="550" y1="300" x2="700" y2="420"/>
  </g>
  <!-- Connection nodes -->
  <!-- Top left node (laptop) -->
  <circle cx="100" cy="160" r="30" fill="#12203a" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <rect x="82" y="150" width="36" height="24" rx="3" fill="#0f172a" stroke="#0ea5e9" stroke-width="0.8" opacity="0.5"/>
  <rect x="85" y="153" width="30" height="16" rx="2" fill="#1a56db" opacity="0.15"/>
  <rect x="78" y="174" width="44" height="3" rx="1" fill="#1a3055"/>
  <!-- Top right node (phone) -->
  <circle cx="700" cy="160" r="30" fill="#12203a" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <rect x="688" y="140" width="24" height="40" rx="4" fill="#0f172a" stroke="#0ea5e9" stroke-width="0.8" opacity="0.5"/>
  <rect x="691" y="148" width="18" height="24" rx="1" fill="#1a56db" opacity="0.15"/>
  <!-- Bottom left node (cloud) -->
  <circle cx="100" cy="420" r="30" fill="#12203a" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <ellipse cx="100" cy="418" rx="18" ry="11" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <ellipse cx="92" cy="422" rx="10" ry="8" fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="110" cy="422" rx="10" ry="8" fill="none" stroke="#0ea5e9" stroke-width="0.8" opacity="0.2"/>
  <!-- Bottom right node (globe) -->
  <circle cx="700" cy="420" r="30" fill="#12203a" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <circle cx="700" cy="420" r="16" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.25"/>
  <ellipse cx="700" cy="420" rx="8" ry="16" fill="none" stroke="#0ea5e9" stroke-width="0.5" opacity="0.2"/>
  <line x1="684" y1="420" x2="716" y2="420" stroke="#0ea5e9" stroke-width="0.5" opacity="0.2"/>
  <!-- WiFi icon above monitor -->
  <g transform="translate(400,110)" fill="none" stroke="#0ea5e9" opacity="0.3">
    <path d="M-20,0 A28,28 0 0,1 20,0" stroke-width="2"/>
    <path d="M-13,7 A18,18 0 0,1 13,7" stroke-width="2"/>
    <path d="M-6,14 A8,8 0 0,1 6,14" stroke-width="2"/>
    <circle cx="0" cy="20" r="3" fill="#0ea5e9"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#0ea5e9" opacity="0.08">
    <circle cx="200" cy="100" r="3"/>
    <circle cx="600" cy="100" r="3"/>
    <circle cx="200" cy="500" r="3"/>
    <circle cx="600" cy="500" r="3"/>
    <circle cx="150" cy="290" r="2"/>
    <circle cx="650" cy="290" r="2"/>
  </g>
  <!-- Label -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#e8eefb" opacity="0.5" letter-spacing="6">VIRTUAL OFFICE</text>
  <text x="400" y="505" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0ea5e9" opacity="0.35" letter-spacing="3">PLACEHOLDER IMAGE</text>
</svg>