<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1a56db"/>
      <stop offset="70%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#e8eefb"/>
    </linearGradient>
    <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  <!-- Horizon glow -->
  <ellipse cx="960" cy="750" rx="1200" ry="200" fill="url(#glowGrad)"/>
  <!-- Far buildings -->
  <rect x="80" y="480" width="90" height="300" fill="#162d50" rx="2"/>
  <rect x="190" y="420" width="70" height="360" fill="#1a3660" rx="2"/>
  <rect x="280" y="500" width="100" height="280" fill="#152b4a" rx="2"/>
  <rect x="400" y="380" width="80" height="400" fill="#1a3660" rx="2"/>
  <rect x="500" y="450" width="110" height="330" fill="#162d50" rx="2"/>
  <rect x="630" y="350" width="90" height="430" fill="#1e3f6b" rx="2"/>
  <!-- Main tower -->
  <rect x="740" y="250" width="120" height="530" fill="url(#buildGrad)" rx="3"/>
  <rect x="755" y="240" width="90" height="10" fill="#0ea5e9" opacity="0.6" rx="1"/>
  <!-- Windows on main tower -->
  <g fill="#0ea5e9" opacity="0.25">
    <rect x="755" y="270" width="18" height="12" rx="1"/><rect x="780" y="270" width="18" height="12" rx="1"/><rect x="805" y="270" width="18" height="12" rx="1"/><rect x="830" y="270" width="18" height="12" rx="1"/>
    <rect x="755" y="295" width="18" height="12" rx="1"/><rect x="780" y="295" width="18" height="12" rx="1"/><rect x="805" y="295" width="18" height="12" rx="1"/><rect x="830" y="295" width="18" height="12" rx="1"/>
    <rect x="755" y="320" width="18" height="12" rx="1"/><rect x="780" y="320" width="18" height="12" rx="1"/><rect x="805" y="320" width="18" height="12" rx="1"/><rect x="830" y="320" width="18" height="12" rx="1"/>
    <rect x="755" y="345" width="18" height="12" rx="1"/><rect x="780" y="345" width="18" height="12" rx="1"/><rect x="805" y="345" width="18" height="12" rx="1"/><rect x="830" y="345" width="18" height="12" rx="1"/>
    <rect x="755" y="370" width="18" height="12" rx="1"/><rect x="780" y="370" width="18" height="12" rx="1"/><rect x="805" y="370" width="18" height="12" rx="1"/><rect x="830" y="370" width="18" height="12" rx="1"/>
    <rect x="755" y="395" width="18" height="12" rx="1"/><rect x="780" y="395" width="18" height="12" rx="1"/><rect x="805" y="395" width="18" height="12" rx="1"/><rect x="830" y="395" width="18" height="12" rx="1"/>
    <rect x="755" y="420" width="18" height="12" rx="1"/><rect x="780" y="420" width="18" height="12" rx="1"/><rect x="805" y="420" width="18" height="12" rx="1"/><rect x="830" y="420" width="18" height="12" rx="1"/>
  </g>
  <!-- Lit windows -->
  <g fill="#f5d078" opacity="0.7">
    <rect x="780" y="295" width="18" height="12" rx="1"/>
    <rect x="830" y="345" width="18" height="12" rx="1"/>
    <rect x="755" y="370" width="18" height="12" rx="1"/>
    <rect x="805" y="420" width="18" height="12" rx="1"/>
  </g>
  <!-- More buildings right side -->
  <rect x="880" y="400" width="100" height="380" fill="#1a3660" rx="2"/>
  <rect x="1000" y="350" width="80" height="430" fill="#162d50" rx="2"/>
  <rect x="1100" y="430" width="120" height="350" fill="#1e3f6b" rx="2"/>
  <rect x="1240" y="380" width="70" height="400" fill="#1a3660" rx="2"/>
  <rect x="1330" y="460" width="100" height="320" fill="#152b4a" rx="2"/>
  <rect x="1450" y="400" width="90" height="380" fill="#162d50" rx="2"/>
  <rect x="1560" y="440" width="80" height="340" fill="#1e3f6b" rx="2"/>
  <rect x="1660" y="480" width="110" height="300" fill="#1a3660" rx="2"/>
  <rect x="1790" y="500" width="90" height="280" fill="#152b4a" rx="2"/>
  <!-- Windows on other buildings -->
  <g fill="#0ea5e9" opacity="0.15">
    <rect x="900" y="420" width="14" height="10" rx="1"/><rect x="920" y="420" width="14" height="10" rx="1"/><rect x="940" y="420" width="14" height="10" rx="1"/>
    <rect x="900" y="445" width="14" height="10" rx="1"/><rect x="920" y="445" width="14" height="10" rx="1"/><rect x="940" y="445" width="14" height="10" rx="1"/>
    <rect x="900" y="470" width="14" height="10" rx="1"/><rect x="920" y="470" width="14" height="10" rx="1"/><rect x="940" y="470" width="14" height="10" rx="1"/>
    <rect x="1020" y="370" width="14" height="10" rx="1"/><rect x="1040" y="370" width="14" height="10" rx="1"/><rect x="1060" y="370" width="14" height="10" rx="1"/>
    <rect x="1020" y="395" width="14" height="10" rx="1"/><rect x="1040" y="395" width="14" height="10" rx="1"/><rect x="1060" y="395" width="14" height="10" rx="1"/>
    <rect x="1120" y="450" width="14" height="10" rx="1"/><rect x="1145" y="450" width="14" height="10" rx="1"/><rect x="1170" y="450" width="14" height="10" rx="1"/><rect x="1195" y="450" width="14" height="10" rx="1"/>
    <rect x="1120" y="475" width="14" height="10" rx="1"/><rect x="1145" y="475" width="14" height="10" rx="1"/><rect x="1170" y="475" width="14" height="10" rx="1"/><rect x="1195" y="475" width="14" height="10" rx="1"/>
  </g>
  <!-- Lit windows on other buildings -->
  <g fill="#f5d078" opacity="0.6">
    <rect x="920" y="445" width="14" height="10" rx="1"/>
    <rect x="1040" y="395" width="14" height="10" rx="1"/>
    <rect x="1170" y="450" width="14" height="10" rx="1"/>
    <rect x="1470" y="430" width="14" height="10" rx="1"/>
    <rect x="1690" y="510" width="14" height="10" rx="1"/>
  </g>
  <!-- Ground / street level -->
  <rect x="0" y="780" width="1920" height="300" fill="#0f172a"/>
  <!-- Street line -->
  <rect x="0" y="780" width="1920" height="3" fill="#0ea5e9" opacity="0.2"/>
  <!-- Label -->
  <text x="960" y="920" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#e8eefb" opacity="0.5" letter-spacing="8">EXECUTIVE OFFICE SUITES</text>
  <text x="960" y="970" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#0ea5e9" opacity="0.4" letter-spacing="4">HERO BACKGROUND</text>
</svg>