<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a3055"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#e8eefb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a70"/>
      <stop offset="100%" stop-color="#1a3055"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Floor -->
  <polygon points="0,400 800,400 800,600 0,600" fill="url(#floorGrad)"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0ea5e9" stroke-width="1" opacity="0.2"/>
  <!-- Back wall -->
  <rect x="0" y="80" width="800" height="320" fill="#12203a" opacity="0.5"/>
  <!-- Window -->
  <rect x="250" y="100" width="300" height="220" rx="4" fill="url(#windowGrad)" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <!-- Window panes -->
  <line x1="400" y1="100" x2="400" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <line x1="250" y1="210" x2="550" y2="210" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <!-- Window blinds hint -->
  <g stroke="#e8eefb" stroke-width="0.5" opacity="0.1">
    <line x1="255" y1="130" x2="545" y2="130"/>
    <line x1="255" y1="145" x2="545" y2="145"/>
    <line x1="255" y1="160" x2="545" y2="160"/>
  </g>
  <!-- Desk -->
  <rect x="200" y="350" width="400" height="20" rx="3" fill="url(#deskGrad)" stroke="#0ea5e9" stroke-width="0.5" opacity="0.8"/>
  <!-- Desk legs -->
  <rect x="220" y="370" width="8" height="60" fill="#1a3055" rx="1"/>
  <rect x="572" y="370" width="8" height="60" fill="#1a3055" rx="1"/>
  <!-- Desk panel -->
  <rect x="220" y="380" width="360" height="40" fill="#12203a" rx="2" opacity="0.6"/>
  <!-- Monitor -->
  <rect x="350" y="290" width="100" height="60" rx="3" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" opacity="0.8"/>
  <rect x="355" y="295" width="90" height="50" rx="2" fill="#1a56db" opacity="0.2"/>
  <!-- Monitor stand -->
  <rect x="390" y="350" width="20" height="5" fill="#1a3055"/>
  <rect x="380" y="348" width="40" height="4" rx="1" fill="#2a4a70"/>
  <!-- Keyboard -->
  <rect x="360" y="360" width="80" height="8" rx="2" fill="#1a3055" stroke="#0ea5e9" stroke-width="0.5" opacity="0.6"/>
  <!-- Chair -->
  <ellipse cx="400" cy="470" rx="50" ry="15" fill="#1a56db" opacity="0.3"/>
  <rect x="370" y="430" width="60" height="40" rx="8" fill="#1a56db" opacity="0.25" stroke="#0ea5e9" stroke-width="0.5" opacity="0.4"/>
  <!-- Chair back -->
  <rect x="375" y="395" width="50" height="40" rx="6" fill="#1a56db" opacity="0.2" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <!-- Chair base -->
  <line x1="400" y1="470" x2="400" y2="490" stroke="#1a3055" stroke-width="3"/>
  <line x1="375" y1="495" x2="425" y2="495" stroke="#1a3055" stroke-width="2"/>
  <!-- Side shelf -->
  <rect x="640" y="200" width="80" height="10" rx="1" fill="#2a4a70" opacity="0.6"/>
  <rect x="640" y="260" width="80" height="10" rx="1" fill="#2a4a70" opacity="0.6"/>
  <rect x="640" y="320" width="80" height="10" rx="1" fill="#2a4a70" opacity="0.6"/>
  <!-- Books on shelf -->
  <rect x="650" y="270" width="8" height="48" fill="#1a56db" opacity="0.3" rx="1"/>
  <rect x="662" y="275" width="8" height="43" fill="#0ea5e9" opacity="0.2" rx="1"/>
  <rect x="674" y="272" width="6" height="46" fill="#1a56db" opacity="0.25" rx="1"/>
  <!-- Plant -->
  <rect x="100" y="360" width="12" height="40" fill="#1a3055" rx="2"/>
  <ellipse cx="106" cy="350" rx="25" ry="20" fill="#0ea5e9" opacity="0.15"/>
  <ellipse cx="96" cy="340" rx="15" ry="18" fill="#0ea5e9" opacity="0.1"/>
  <!-- Label -->
  <text x="400" y="555" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#e8eefb" opacity="0.5" letter-spacing="6">PRIVATE OFFICE</text>
  <text x="400" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0ea5e9" opacity="0.35" letter-spacing="3">PLACEHOLDER IMAGE</text>
</svg>