<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1a3660"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bldgMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3f6b"/>
      <stop offset="100%" stop-color="#12203a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#e8eefb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="600" fill="url(#skyB)"/>
  <!-- Ground -->
  <rect x="0" y="480" width="800" height="120" fill="#0f172a"/>
  <!-- Sidewalk -->
  <rect x="0" y="480" width="800" height="15" fill="#162d50" opacity="0.6"/>
  <!-- Main building -->
  <rect x="200" y="80" width="400" height="400" fill="url(#bldgMain)" rx="4"/>
  <!-- Building top accent -->
  <rect x="200" y="76" width="400" height="8" fill="#0ea5e9" opacity="0.3" rx="2"/>
  <!-- Glass facade -->
  <rect x="215" y="95" width="370" height="375" fill="url(#glass)" rx="2"/>
  <!-- Window grid -->
  <g fill="#0ea5e9" opacity="0.12">
    <!-- Row 1 -->
    <rect x="230" y="110" width="50" height="35" rx="2"/>
    <rect x="295" y="110" width="50" height="35" rx="2"/>
    <rect x="360" y="110" width="50" height="35" rx="2"/>
    <rect x="425" y="110" width="50" height="35" rx="2"/>
    <rect x="490" y="110" width="50" height="35" rx="2"/>
    <!-- Row 2 -->
    <rect x="230" y="160" width="50" height="35" rx="2"/>
    <rect x="295" y="160" width="50" height="35" rx="2"/>
    <rect x="360" y="160" width="50" height="35" rx="2"/>
    <rect x="425" y="160" width="50" height="35" rx="2"/>
    <rect x="490" y="160" width="50" height="35" rx="2"/>
    <!-- Row 3 -->
    <rect x="230" y="210" width="50" height="35" rx="2"/>
    <rect x="295" y="210" width="50" height="35" rx="2"/>
    <rect x="360" y="210" width="50" height="35" rx="2"/>
    <rect x="425" y="210" width="50" height="35" rx="2"/>
    <rect x="490" y="210" width="50" height="35" rx="2"/>
    <!-- Row 4 -->
    <rect x="230" y="260" width="50" height="35" rx="2"/>
    <rect x="295" y="260" width="50" height="35" rx="2"/>
    <rect x="360" y="260" width="50" height="35" rx="2"/>
    <rect x="425" y="260" width="50" height="35" rx="2"/>
    <rect x="490" y="260" width="50" height="35" rx="2"/>
    <!-- Row 5 -->
    <rect x="230" y="310" width="50" height="35" rx="2"/>
    <rect x="295" y="310" width="50" height="35" rx="2"/>
    <rect x="360" y="310" width="50" height="35" rx="2"/>
    <rect x="425" y="310" width="50" height="35" rx="2"/>
    <rect x="490" y="310" width="50" height="35" rx="2"/>
    <!-- Row 6 -->
    <rect x="230" y="360" width="50" height="35" rx="2"/>
    <rect x="295" y="360" width="50" height="35" rx="2"/>
    <rect x="360" y="360" width="50" height="35" rx="2"/>
    <rect x="425" y="360" width="50" height="35" rx="2"/>
    <rect x="490" y="360" width="50" height="35" rx="2"/>
  </g>
  <!-- Lit windows -->
  <g fill="#f5d078" opacity="0.5">
    <rect x="295" y="160" width="50" height="35" rx="2"/>
    <rect x="490" y="210" width="50" height="35" rx="2"/>
    <rect x="230" y="310" width="50" height="35" rx="2"/>
    <rect x="425" y="310" width="50" height="35" rx="2"/>
    <rect x="360" y="360" width="50" height="35" rx="2"/>
  </g>
  <!-- Entrance -->
  <rect x="340" y="420" width="120" height="60" rx="3" fill="#0f172a" stroke="#0ea5e9" stroke-width="1" opacity="0.7"/>
  <!-- Entrance doors -->
  <rect x="355" y="425" width="40" height="55" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <rect x="405" y="425" width="40" height="55" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="0.5" opacity="0.3"/>
  <!-- Door handles -->
  <rect x="388" y="448" width="3" height="12" rx="1" fill="#0ea5e9" opacity="0.4"/>
  <rect x="410" y="448" width="3" height="12" rx="1" fill="#0ea5e9" opacity="0.4"/>
  <!-- Entrance canopy -->
  <rect x="320" y="415" width="160" height="8" rx="2" fill="#1e3f6b" stroke="#0ea5e9" stroke-width="0.5" opacity="0.5"/>
  <!-- Side building left -->
  <rect x="60" y="280" width="120" height="200" fill="#12203a" rx="2"/>
  <g fill="#0ea5e9" opacity="0.08">
    <rect x="75" y="300" width="30" height="22" rx="1"/>
    <rect x="115" y="300" width="30" height="22" rx="1"/>
    <rect x="75" y="340" width="30" height="22" rx="1"/>
    <rect x="115" y="340" width="30" height="22" rx="1"/>
    <rect x="75" y="380" width="30" height="22" rx="1"/>
    <rect x="115" y="380" width="30" height="22" rx="1"/>
    <rect x="75" y="420" width="30" height="22" rx="1"/>
    <rect x="115" y="420" width="30" height="22" rx="1"/>
  </g>
  <!-- Side building right -->
  <rect x="620" y="320" width="120" height="160" fill="#12203a" rx="2"/>
  <g fill="#0ea5e9" opacity="0.08">
    <rect x="635" y="340" width="30" height="22" rx="1"/>
    <rect x="675" y="340" width="30" height="22" rx="1"/>
    <rect x="635" y="380" width="30" height="22" rx="1"/>
    <rect x="675" y="380" width="30" height="22" rx="1"/>
    <rect x="635" y="420" width="30" height="22" rx="1"/>
    <rect x="675" y="420" width="30" height="22" rx="1"/>
  </g>
  <!-- Trees -->
  <rect x="160" y="440" width="8" height="40" fill="#1a3055"/>
  <circle cx="164" cy="425" r="20" fill="#0ea5e9" opacity="0.1"/>
  <rect x="632" y="445" width="8" height="35" fill="#1a3055"/>
  <circle cx="636" cy="430" r="18" fill="#0ea5e9" opacity="0.1"/>
  <!-- Street -->
  <rect x="0" y="495" width="800" height="3" fill="#0ea5e9" opacity="0.08"/>
  <!-- Label -->
  <text x="400" y="555" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#e8eefb" opacity="0.5" letter-spacing="6">BUILDING EXTERIOR</text>
  <text x="400" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0ea5e9" opacity="0.35" letter-spacing="3">PLACEHOLDER IMAGE</text>
</svg>